<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honeypot Viewer</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    /* 让地图铺满整个屏幕喵！ */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #1a1a1a; /* 深色背景，更像黑客基地喵 */
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    /* 给主人的服务器 marker 加个酷酷的呼吸灯效果喵 */
    .leaflet-interactive {
      transition: filter 0.3s;
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <script type="module" src="/dist/bundle.js"></script>

</body>
</html>
